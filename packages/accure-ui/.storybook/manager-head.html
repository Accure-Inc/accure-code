<style>
  /* Hide Color Scheme toolbar when accure-vscode theme is active */
  html[data-accure-theme="accure-vscode"] [aria-label^="Color Scheme"] {
    display: none !important;
  }

  /* Hide VS Code Theme toolbar by default and when accure theme is active */
  html:not([data-accure-theme="accure-vscode"]) [aria-label^="VSCode Theme"] {
    display: none !important;
  }
</style>
