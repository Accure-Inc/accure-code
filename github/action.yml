name: "Accure GitHub Action"
description: "Run Accure AI agent in GitHub Actions workflows"
branding:
  icon: "code"
  color: "gray-dark"

inputs:
  model:
    description: "Model to use"
    required: true

  agent:
    description: "Agent to use. Must be a primary agent. Falls back to default_agent from config or 'build' if not found."
    required: false

  share:
    description: "Share the Accure session (defaults to true for public repos)"
    required: false

  prompt:
    description: "Custom prompt to override the default prompt"
    required: false

  use_github_token:
    description: "Use GITHUB_TOKEN directly instead of Accure App token exchange. When true, skips OIDC and uses the GITHUB_TOKEN env var."
    required: false
    default: "false"

  mentions:
    description: "Comma-separated list of trigger phrases (case-insensitive). Defaults to '/accure,/kc'"
    required: false

  variant:
    description: "Model variant for provider-specific reasoning effort (e.g., high, max, minimal)"
    required: false

  oidc_base_url:
    description: "Base URL for OIDC token exchange API. Only required when running a custom GitHub App install. Defaults to https://api.accurecode.ai"
    required: false

  accure_api_key:
    description: "Accure API key for gateway authentication"
    required: false

  accure_org_id:
    description: "Accure organization ID"
    required: false

runs:
  using: "composite"
  steps:
    - name: Get Accure version
      id: version
      shell: bash
      run: |
        VERSION=$(curl -sf https://api.github.com/repos/Accure-Inc/accure-code/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
        echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

    - name: Cache Accure
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/.accurecode/bin
        key: accure-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}

    - name: Install Accure
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: curl -fsSL https://accure.ai/cli/install | bash

    - name: Add Accure to PATH
      shell: bash
      run: echo "$HOME/.accurecode/bin" >> $GITHUB_PATH

    - name: Run Accure
      shell: bash
      id: run_accure
      run: accure github run
      env:
        MODEL: ${{ inputs.model }}
        AGENT: ${{ inputs.agent }}
        SHARE: ${{ inputs.share }}
        PROMPT: ${{ inputs.prompt }}
        USE_GITHUB_TOKEN: ${{ inputs.use_github_token }}
        MENTIONS: ${{ inputs.mentions }}
        VARIANT: ${{ inputs.variant }}
        OIDC_BASE_URL: ${{ inputs.oidc_base_url }}
        ACCURECODE_API_KEY: ${{ inputs.accure_api_key }}
        ACCURECODE_ORG_ID: ${{ inputs.accure_org_id }}
