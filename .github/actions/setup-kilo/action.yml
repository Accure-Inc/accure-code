# accurecode_change - new file
name: "Setup Accure"
description: "Install Accure CLI globally"
runs:
  using: "composite"
  steps:
    - name: Install Accure CLI
      run: curl -fsSL https://accure.ai/cli/install | bash
      shell: bash

    - name: Add Accure to PATH
      run: echo "$HOME/.accurecode/bin" >> $GITHUB_PATH
      shell: bash
